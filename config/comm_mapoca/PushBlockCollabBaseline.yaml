behaviors:
  # STOCK MA-POCA baseline for the Comm-MAPOCA benchmark. Identical to Unity's
  # official config/poca/PushBlockCollab.yaml except max_steps extended
  # 15M -> 30M to exactly match the comm run (pushblock_comm_fullobs_s1).
  # Trainer is pristine poca; only the step budget differs from stock.
  PushBlockCollab:
    trainer_type: poca
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: constant
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 30000000
    time_horizon: 64
    summary_freq: 60000
