behaviors:
  # Comm-MAPOCA variant of Cooperative Push Block. Hyperparameters copied from
  # the stock config/poca/PushBlockCollab.yaml so the ONLY differences vs the
  # baseline are the trainer (comm_mapoca) and the communication channel
  # (CommChannel All-to-All + 6 continuous message/attention actions).
  CommPushBlock:
    trainer_type: comm_mapoca
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: constant
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    # 15M -> 30M (2026-07-09): reward was still climbing linearly at the 15M cutoff
    # (constant LR schedule, so resuming is seamless with no warm-restart effect)
    max_steps: 30000000
    time_horizon: 64
    summary_freq: 60000
