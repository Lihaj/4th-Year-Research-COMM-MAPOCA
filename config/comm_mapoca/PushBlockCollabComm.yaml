behaviors:
  # Comm-MAPOCA variant of Cooperative Push Block. Hyperparameters copied from
  # the stock config/poca/PushBlockCollab.yaml so the ONLY differences vs the
  # baseline are the trainer (comm_mapoca) and the communication channel
  # (CommChannel All-to-All + 6 continuous message/attention actions).
  CommPushBlock:
    trainer_type: comm_mapoca
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: constant
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    # 15M -> 30M (2026-07-09): reward still climbing at the 15M cutoff.
    # 30M -> 40M (2026-07-11): long-run capability extension - reward ~1.14 at 30M,
    # still rising slowly; testing how far the architecture can go. NOTE: the paper's
    # matched-budget comparison figure remains 30M-vs-30M; this extension is a
    # separate capability result. Constant LR schedule -> resume is seamless.
    max_steps: 40000000
    time_horizon: 64
    summary_freq: 60000
