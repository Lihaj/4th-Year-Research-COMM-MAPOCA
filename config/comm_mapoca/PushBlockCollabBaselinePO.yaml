behaviors:
  # PARTIAL-OBSERVABILITY (7x7-unit sensing) STOCK MA-POCA baseline - the
  # comparison arm for the headline experiment. Identical to
  # PushBlockCollabBaseline.yaml except the behavior name: agents carry the
  # same 20x20-cell GridSensor with Cell Scale 0.35 (7x7 world units of
  # coverage), exactly matching the comm PO variant's sensing. Trainer is
  # pristine poca; observation shape and network identical to full-obs.
  PushBlockCollabPO:
    trainer_type: poca
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: constant
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 30000000
    time_horizon: 64
    summary_freq: 60000
