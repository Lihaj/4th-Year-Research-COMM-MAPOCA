behaviors:
  # Curriculum run of the full-observability Comm-MAPOCA Push Block. Same
  # hyperparameters as PushBlockCollabComm.yaml; difficulty ramps via the
  # pb_lesson environment parameter (see the lesson table in
  # CommPushBlockEnvController). v2: the original 1-block Lesson 0 never
  # ignited in 6M steps (one block in a 20x20 arena = too few random
  # encounters); each new block TYPE now gets a near-goal-spawn ignition rung
  # (spread<1) before full-random spawning.
  CommPushBlock:
    trainer_type: comm_mapoca
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: constant
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 30000000
    time_horizon: 64
    summary_freq: 60000

environment_parameters:
  # Index into the controller's lesson table:
  #   lesson | blocks                      | spawn            | max reward
  #   0      | 1 small                     | beside goal 0.15 | ~1
  #   1      | 1 small                     | random           | ~1
  #   2      | 2 small                     | random           | ~2
  #   3      | 2 small + 1 large           | near goal 0.3    | ~4
  #   4      | 2 small + 1 large           | random           | ~4
  #   5      | 2 small + 1 large + 1 vlarge| near goal 0.3    | ~7
  #   6      | 2 small + 2 large + 1 vlarge| random           | ~9
  #   7      | ALL 6 blocks                | random           | ~12
  # Thresholds sit ~70% of each lesson's achievable maximum (group reward).
  pb_lesson:
    curriculum:
      - name: L0_OneSmallBesideGoal
        completion_criteria:
          measure: reward
          behavior: CommPushBlock
          signal_smoothing: true
          min_lesson_length: 150
          threshold: 0.7
        value: 0.0
      - name: L1_OneSmallAnywhere
        completion_criteria:
          measure: reward
          behavior: CommPushBlock
          signal_smoothing: true
          min_lesson_length: 150
          threshold: 0.7
        value: 1.0
      - name: L2_TwoSmall
        completion_criteria:
          measure: reward
          behavior: CommPushBlock
          signal_smoothing: true
          min_lesson_length: 150
          threshold: 1.5
        value: 2.0
      - name: L3_SmallsPlusLargeNearGoal
        completion_criteria:
          measure: reward
          behavior: CommPushBlock
          signal_smoothing: true
          min_lesson_length: 150
          # 2.8 -> 3.4: at 2.8 the two smalls (~1.9) let agents advance while
          # clearing the large only ~45% of the time; 3.4 demands ~75% -- the
          # 2-agent push must be a reliable skill before leaving the nursery.
          threshold: 3.4
        value: 3.0
      - name: L4_SmallsPlusLargeAnywhere
        completion_criteria:
          measure: reward
          behavior: CommPushBlock
          signal_smoothing: true
          min_lesson_length: 150
          threshold: 2.8
        value: 4.0
      - name: L5_AddVeryLargeNearGoal
        completion_criteria:
          measure: reward
          behavior: CommPushBlock
          signal_smoothing: true
          min_lesson_length: 150
          threshold: 5.0
        value: 5.0
      - name: L6_MixedFive
        completion_criteria:
          measure: reward
          behavior: CommPushBlock
          signal_smoothing: true
          min_lesson_length: 150
          threshold: 6.5
        value: 6.0
      - name: L7_FullTask
        value: 7.0
