behaviors:
  # Curriculum run of the full-observability Comm-MAPOCA Push Block. Same
  # hyperparameters as PushBlockCollabComm.yaml; difficulty ramps via the
  # active_blocks environment parameter below instead of starting at the full
  # 6-block task (whose random-exploration ignition probability is too low --
  # the flat-at-1.2 40M run demonstrated exactly that).
  CommPushBlock:
    trainer_type: comm_mapoca
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: constant
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 30000000
    time_horizon: 64
    summary_freq: 60000

environment_parameters:
  # Number of blocks enabled per episode. BlocksList in the controller must be
  # ordered easiest-first: small, small, large, large, very large, very large.
  # Lessons advance automatically when the smoothed GROUP reward crosses the
  # threshold (thresholds sit ~70-80% of each lesson's achievable maximum:
  # smalls score 1, larges 2, very larges 3).
  active_blocks:
    curriculum:
      - name: Lesson0_OneSmall          # max ~1
        completion_criteria:
          measure: reward
          behavior: CommPushBlock
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.7
        value: 1.0
      - name: Lesson1_TwoSmall          # max ~2
        completion_criteria:
          measure: reward
          behavior: CommPushBlock
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 1.6
        value: 2.0
      - name: Lesson2_AddLarge          # max ~4, first 2-agent block
        completion_criteria:
          measure: reward
          behavior: CommPushBlock
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 3.0
        value: 3.0
      - name: Lesson3_TwoLarge          # max ~6
        completion_criteria:
          measure: reward
          behavior: CommPushBlock
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 4.8
        value: 4.0
      - name: Lesson4_AddVeryLarge      # max ~9, first 3-agent block
        completion_criteria:
          measure: reward
          behavior: CommPushBlock
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 7.0
        value: 5.0
      - name: Lesson5_FullTask          # all 6 blocks, max ~12
        value: 6.0
