behaviors:
  # COMM-MAPOCA: Oracle and Walker now share one Behavior Name so that ml-agents'
  # SimpleMultiAgentGroup (and therefore the MA-POCA centralized critic) can treat
  # them as real groupmates -- ml-agents does not support different behavior names
  # within the same group (see Learning-Environment-Design-Agents.md, "Cooperative
  # Behaviors Notes and Best Practices").
  CommMAPOCABrain:
    trainer_type: poca
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    # Extended 10M -> 30M (2026-07-06) to continue Run B past its max_steps cutoff:
    # at 10M the emergent protocol works (reward ~4.1, ep len ~120) but attention
    # targeting is not yet crisp. With the linear LR schedule, resuming with a larger
    # max_steps also restores a moderate learning rate (~2/3 of initial at step 10M).
    max_steps: 30000000
    time_horizon: 64
    summary_freq: 50000